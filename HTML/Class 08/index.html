    <h1>Personal Form!</h1>

    <form action="./server.html" method="get">

        <label for="fullName">
            Full Name:
            <input type="text" name="fullName" required
             placeholder="Type your Full Name!" id="fullName">
        </label><br><br>

        <label for="email">
            Email:
            <input type="email" name="email" required
            placeholder="Type your email" id="email"
            >
        </label><br><br>

        <label for="password">
            Password:
            <input type="password" name="password" required id="password">
        </label> <br><br>

        <label>Gender</label>
        <label for="male">
            <input type="radio" name="gender" id="male" value="male">
            Male
        </label>
        <label for="female">
            <input type="radio" name="gender" id="female" value="female">
            Female
        </label><br><br>
        <label >Hobbies</label>
        <label for="sports">
            <input type="checkbox" name="Hobbies" value="sports" id="sports">
            Sports
        </label>
        <label for="reading">
            <input type="checkbox" name="Hobbies" value="reading" id="reading">
            Reading
        </label>
        <label for="cooking">
            <input type="checkbox" name="Hobbies" value="cooking" id="cooking">
            Cooking
        </label>
        <label for="singing">
            <input type="checkbox" name="Hobbies" value="singing" id="singing">
            Singing
        </label> <br><br>

        <label for="select">Select</label>
        <select name="Course" id="select">
            <option disabled selected >Select Your Course</option>
            <option value="Modern Web and App">Modern Web and App</option>
            <option value="Graphic Designing">Graphic Designing</option>
            <option value="Animation">Animation</option>
        </select>
        <br><br>
        <input type="submit" value="Submit!">





    </form>
